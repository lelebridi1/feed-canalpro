name: Gerar feed CanalPro

# Roda todo dia as 06:00 UTC (03:00 de Brasilia) e tambem na mao pelo botao Run workflow.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar o feed
        run: node gerar-feed.js

      - name: Salvar feed e estado de volta no repositorio
        run: |
          git config user.name  "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add feed-grupozap.xml estado.json
          if git diff --staged --quiet; then
            echo "Nada mudou hoje."
          else
            git commit -m "Atualiza feed"
            git push
          fi
